<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AI Fitness Coach</title>
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="manifest" href="manifest.json" />

  <!-- iOS: Safari ignores manifest.json for home-screen behavior, so
       these tags do the same job Apple's way. apple-touch-icon must be
       a PNG — iOS does not accept SVG here. -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FitCoach" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <link rel="icon" href="icons/icon-512.png" type="image/png" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app-root" class="app-root"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
